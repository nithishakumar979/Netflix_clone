<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Netflix</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="animations.css"/>
  <link rel="stylesheet" href="responsive.css"/>
  <style>
    body { background: #050508; min-height: 100vh; display: flex; flex-direction: column; }
    .auth-layout { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; padding: var(--space-2xl) 0; }
    .auth-bg { position: absolute; inset: 0; z-index: 0; overflow: hidden; }
    .auth-bg img { width: 100%; height: 100%; object-fit: cover; opacity: 0.2; filter: blur(3px); }
    .auth-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(5,5,8,0.7) 0%, rgba(5,5,8,1) 100%); }
    
    .auth-container { position: relative; z-index: 1; width: 100%; max-width: 450px; background: rgba(0,0,0,0.6); backdrop-filter: var(--blur-lg); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-xl); padding: var(--space-3xl) var(--space-2xl); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
    
    .auth-logo { text-align: center; margin-bottom: var(--space-2xl); }
    .auth-logo a { font-size: 2.5rem; font-weight: 900; letter-spacing: 2px; color: white; text-decoration: none; }
    .auth-logo span { color: var(--clr-primary); }
    
    .auth-title { font-size: 2rem; font-weight: 700; margin-bottom: var(--space-xl); color: white; }
    
    .auth-footer { margin-top: var(--space-xl); text-align: center; color: var(--clr-text-muted); font-size: 0.95rem; }
    .auth-footer a { color: white; font-weight: 600; text-decoration: none; transition: var(--transition-fast); }
    .auth-footer a:hover { color: var(--clr-primary); text-decoration: underline; }
    
    .divider { display: flex; align-items: center; margin: var(--space-xl) 0; color: var(--clr-text-dim); font-size: 0.9rem; }
    .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: rgba(255,255,255,0.1); }
    .divider::before { margin-right: 15px; }
    .divider::after { margin-left: 15px; }
    
    .social-btn-login { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-md); color: white; font-weight: 600; cursor: pointer; transition: var(--transition-fast); }
    .social-btn-login:hover { background: rgba(255,255,255,0.1); }
    
    .remember-forgot { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-xl); font-size: 0.9rem; }
    .remember-label { display: flex; align-items: center; gap: 8px; color: var(--clr-text-muted); cursor: pointer; }
    .forgot-link { color: var(--clr-primary); text-decoration: none; transition: var(--transition-fast); }
    .forgot-link:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- Minimal Nav just for logo back to home if needed, or omit it -->

  <div class="auth-layout">
    <div class="auth-bg">
      <img src="assets/images/hero_banner.jpg" alt="Background"/>
      <div class="auth-overlay"></div>
    </div>
    
    <div class="auth-container reveal">
      <div class="auth-logo">
        <a href="index.html">Netflix</a>
      </div>
      
      <h1 class="auth-title">Sign In</h1>
      
      <form id="signin-form" class="form-group">
        <div class="form-group">
          <input type="email" class="form-input" placeholder="Email or phone number" required />
        </div>
        <div class="form-group" style="margin-top: 15px;">
          <input type="password" class="form-input" placeholder="Password" required />
        </div>
        
        <div class="remember-forgot" style="margin-top: 15px;">
          <label class="remember-label">
            <input type="checkbox" checked style="accent-color: var(--clr-primary);"/> Remember me
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>
        
        <button type="submit" class="btn btn-primary w-full" style="padding: 14px; font-size: 1.1rem; margin-top: 5px;">Sign In</button>
      </form>
      
      <div class="divider">OR</div>
      
      <button class="social-btn-login">
        <span style="font-size:1.2rem;">G</span> Sign in with Google
      </button>
      
      <div class="auth-footer">
        New to LUMIX? <a href="signup.html">Sign up now.</a>
        <p style="font-size:0.8rem; color:var(--clr-text-dim); margin-top:15px; line-height:1.5;">This page is protected by Google reCAPTCHA to ensure you're not a bot. <a href="#" style="color:var(--clr-primary);font-weight:400;">Learn more.</a></p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
